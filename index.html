<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Roadmap Generator — Cayde AI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --void: #040408;
  --surface: #0C0804;
  --border: #1A0E06;
  --ember: #E8906A;
  --ember-dim: rgba(232,144,106,0.12);
  --ember-glow: rgba(232,144,106,0.25);
  --linen: #F0E0CC;
  --ash: #7A5030;
  --ash-light: #A07050;
  --green: #10B981;
  --purple: #A78BFA;
  --gold: #EAB308;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--void);
  color: var(--linen);
  font-family: 'Exo 2', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: crosshair;
}

/* Starfield */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(240,224,204,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 60%, rgba(240,224,204,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 10%, rgba(240,224,204,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 80%, rgba(240,224,204,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 35%, rgba(240,224,204,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 75%, rgba(240,224,204,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 45%, rgba(240,224,204,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 15%, rgba(240,224,204,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 90%, rgba(240,224,204,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 55%, rgba(240,224,204,0.35) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* Grid overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(232,144,106,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232,144,106,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 48px;
  animation: fadeDown 0.8s ease both;
}

@keyframes fadeDown {
  from { opacity:0; transform:translateY(-20px); }
  to { opacity:1; transform:none; }
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--ember-dim);
  border: 0.5px solid rgba(232,144,106,0.3);
  border-radius: 20px;
  padding: 5px 14px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--ember);
  letter-spacing: .15em;
  margin-bottom: 20px;
}

.badge-dot {
  width: 5px; height: 5px;
  background: var(--ember);
  border-radius: 50%;
  animation: blink 1.5s infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

h1 {
  font-family: 'Orbitron', monospace;
  font-size: clamp(28px, 5vw, 44px);
  font-weight: 900;
  color: var(--ember);
  letter-spacing: .06em;
  line-height: 1.1;
  margin-bottom: 12px;
}

.subtitle {
  font-size: 15px;
  color: var(--ash-light);
  line-height: 1.6;
  max-width: 480px;
  margin: 0 auto;
  font-weight: 300;
}

/* PROGRESS */
.progress-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 32px;
  animation: fadeUp 0.6s ease 0.3s both;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:none; }
}

.progress-step {
  flex: 1;
  height: 3px;
  background: rgba(232,144,106,0.15);
  border-radius: 2px;
  transition: background 0.4s ease;
  position: relative;
  overflow: hidden;
}

.progress-step.active {
  background: var(--ember);
}

.progress-step.active::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}

.progress-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--ash);
  letter-spacing: .1em;
  white-space: nowrap;
}

/* QUESTION CARD */
.question-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  margin-bottom: 16px;
  animation: cardIn 0.4s ease both;
  position: relative;
  overflow: hidden;
}

@keyframes cardIn {
  from { opacity:0; transform:translateY(16px) scale(0.98); }
  to { opacity:1; transform:none; }
}

.question-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--ember), transparent);
  opacity: 0.4;
}

.q-number {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--ember);
  letter-spacing: .2em;
  margin-bottom: 10px;
}

.q-text {
  font-family: 'Orbitron', monospace;
  font-size: clamp(14px, 2.5vw, 18px);
  font-weight: 600;
  color: var(--linen);
  line-height: 1.4;
  margin-bottom: 6px;
  letter-spacing: .02em;
}

.q-sub {
  font-size: 12px;
  color: var(--ash-light);
  margin-bottom: 24px;
  line-height: 1.5;
}

/* OPTIONS */
.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option {
  background: rgba(255,255,255,0.02);
  border: 0.5px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  padding: 14px 18px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 14px;
  color: var(--linen);
  position: relative;
  overflow: hidden;
}

.option::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--ember-dim);
  opacity: 0;
  transition: opacity 0.2s;
}

.option:hover { border-color: rgba(232,144,106,0.3); }
.option:hover::before { opacity: 1; }

.option.selected {
  border-color: var(--ember);
  background: var(--ember-dim);
}

.option.selected .opt-icon { color: var(--ember); }

.opt-key {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--ash);
  width: 18px;
  flex-shrink: 0;
  letter-spacing: .05em;
}

.option.selected .opt-key { color: var(--ember); }

.opt-content { flex: 1; }
.opt-label { font-weight: 500; margin-bottom: 2px; }
.opt-desc { font-size: 11px; color: var(--ash-light); }

.opt-check {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.option.selected .opt-check {
  background: var(--ember);
  border-color: var(--ember);
}

.opt-check::after {
  content: '✓';
  font-size: 10px;
  color: #000;
  opacity: 0;
  transition: opacity 0.2s;
}

.option.selected .opt-check::after { opacity: 1; }

/* NAVIGATION */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.btn-back {
  padding: 12px 24px;
  border-radius: 8px;
  border: 0.5px solid rgba(255,255,255,0.1);
  background: transparent;
  color: var(--ash-light);
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  letter-spacing: .08em;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-back:hover { border-color: rgba(255,255,255,0.2); color: var(--linen); }

.btn-next {
  flex: 1;
  padding: 14px 28px;
  border-radius: 8px;
  border: none;
  background: var(--ember);
  color: #000;
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .1em;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.btn-next::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transform: translateX(-100%);
  transition: transform 0.4s;
}

.btn-next:hover::before { transform: translateX(100%); }
.btn-next:hover { box-shadow: 0 0 24px rgba(232,144,106,0.4); }
.btn-next:disabled { opacity: 0.4; cursor: not-allowed; }

/* LOADING */
.loading {
  text-align: center;
  padding: 48px 32px;
  animation: fadeUp 0.4s ease both;
}

.loading-core {
  width: 60px; height: 60px;
  border-radius: 50%;
  border: 2px solid rgba(232,144,106,0.2);
  border-top-color: var(--ember);
  animation: spin 1s linear infinite;
  margin: 0 auto 24px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--ember);
  letter-spacing: .1em;
  margin-bottom: 8px;
}

.loading-sub {
  font-size: 12px;
  color: var(--ash);
}

/* RESULT */
.result {
  animation: cardIn 0.5s ease both;
}

.result-header {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 16px 16px 0 0;
  padding: 28px 32px;
  border-bottom: 1px solid rgba(232,144,106,0.15);
  position: relative;
  overflow: hidden;
}

.result-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--ember), transparent);
}

.result-title {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  letter-spacing: .2em;
  color: var(--ember);
  margin-bottom: 8px;
}

.result-name {
  font-family: 'Orbitron', monospace;
  font-size: clamp(18px, 3vw, 26px);
  font-weight: 700;
  color: var(--linen);
  margin-bottom: 4px;
}

.result-body {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-top: none;
  border-radius: 0 0 16px 16px;
  padding: 32px;
}

.result-content {
  font-size: 14px;
  line-height: 1.8;
  color: var(--linen);
  white-space: pre-wrap;
}

/* Style the AI output */
.result-content h2 {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  color: var(--ember);
  letter-spacing: .1em;
  margin: 24px 0 12px;
  padding-bottom: 8px;
  border-bottom: 0.5px solid rgba(232,144,106,0.2);
}

.result-content h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--linen);
  margin: 16px 0 6px;
}

.result-content strong {
  color: var(--ember);
}

.result-content ul {
  margin: 8px 0 8px 16px;
}

.result-content li {
  margin-bottom: 4px;
  color: var(--ash-light);
}

.result-content li::marker { color: var(--ember); }

/* CTA section */
.result-cta {
  margin-top: 32px;
  padding: 24px;
  background: var(--ember-dim);
  border: 0.5px solid rgba(232,144,106,0.25);
  border-radius: 12px;
  text-align: center;
}

.result-cta-title {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  color: var(--ember);
  letter-spacing: .08em;
  margin-bottom: 8px;
}

.result-cta-text {
  font-size: 13px;
  color: var(--ash-light);
  line-height: 1.6;
  margin-bottom: 16px;
}

.cta-buttons {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.cta-btn {
  padding: 10px 24px;
  border-radius: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: .08em;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.cta-btn.primary {
  background: var(--ember);
  color: #000;
  border: none;
  font-weight: 700;
}

.cta-btn.primary:hover { box-shadow: 0 0 20px rgba(232,144,106,0.4); }

.cta-btn.secondary {
  background: transparent;
  color: var(--linen);
  border: 0.5px solid rgba(255,255,255,0.15);
}

.cta-btn.secondary:hover { border-color: var(--ember); color: var(--ember); }

.restart-btn {
  display: block;
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  background: transparent;
  border: 0.5px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  color: var(--ash);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: .08em;
  cursor: pointer;
  transition: all 0.2s;
}

.restart-btn:hover { color: var(--linen); border-color: rgba(255,255,255,0.15); }

/* OTHER text input */
.other-input-wrap {
  margin-top: 10px;
  animation: fadeUp 0.2s ease both;
}

.other-input {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 0.5px solid rgba(232,144,106,0.4);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--linen);
  font-family: 'Exo 2', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.other-input::placeholder { color: var(--ash); }
.other-input:focus { border-color: var(--ember); }

/* UPSELL TIERS */
.upsell-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  margin-top: 16px;
}

.upsell-card {
  background: rgba(255,255,255,0.02);
  border: 0.5px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  transition: all 0.2s;
  text-decoration: none;
  display: block;
}

.upsell-card:hover {
  border-color: rgba(232,144,106,0.3);
  background: var(--ember-dim);
  transform: translateY(-2px);
}

.upsell-card.featured {
  border-color: rgba(232,144,106,0.4);
  background: var(--ember-dim);
}

.upsell-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: .15em;
  color: var(--ember);
  margin-bottom: 6px;
}

.upsell-name {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--linen);
  margin-bottom: 4px;
}

.upsell-price {
  font-size: 18px;
  font-weight: 700;
  color: var(--ember);
  margin-bottom: 4px;
}

.upsell-desc {
  font-size: 10px;
  color: var(--ash-light);
  line-height: 1.4;
}

/* Footer */
.footer {
  text-align: center;
  margin-top: 48px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--ash);
  letter-spacing: .1em;
}

.footer a { color: var(--ember); text-decoration: none; }
</style>
</head>

function goFinderNext() {

    render();

function getFinderAnswer(id) {

  return opt.label;

document.addEventListener('keydown', e => {
  if (mode === null) {
    if (e.key === 'a' || e.key === 'A') choosePath('roadmap');
    if (e.key === 'b' || e.key === 'B') choosePath('finder');
    return;
  }
  if (mode === 'finder') {
    const q = FINDER_QUESTIONS[finderStep];
    const idx = e.key.toUpperCase().charCodeAt(0) - 65;
    if (idx >= 0 && idx < q.options.length) selectFinderOption(idx);
    if (e.key === 'Enter' && finderAnswers[q.id] !== undefined) goFinderNext();
  }
  if (mode === 'roadmap') {
    const q = ROADMAP_QUESTIONS[roadmapStep];
    const idx = e.key.toUpperCase().charCodeAt(0) - 65;
    if (idx >= 0 && idx < q.options.length) selectRoadmapOption(idx);
    if (e.key === 'Enter' && roadmapAnswers[q.id] !== undefined) goRoadmapNext();
  }
});

render();
</script>
</body>
</html>
